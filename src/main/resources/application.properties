# ─── Server ─────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_canteen?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=SmartCanteenSecretKey2025UCERPrayagraj
app.jwt.expiration-ms=604800000

# ─── Canteen Business Config ─────────────────────────────────
app.gst.rate=5
app.queue.avg-prep-time-minutes=3

# ─── AI Chatbot (API) ─────────────────────────────────

app.ai.chatbot.api-key=AIzaSyDGYr2AHBLOqX64rzsKZ5t2FuFYDusaJPg
app.ai.chatbot.model=gemini-2.0-flash
app.ai.chatbot.max-tokens=512

# ─── CORS ────────────────────────────────────────────────────
# Comma-separated list of allowed origins. Use * to allow all.
app.cors.allowed-origins=*

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.smartcanteen=DEBUG